<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1000, initial-scale=1.0">
    <title>Personligt Brev - Victor Vilches</title>
    <style>
        @page {
            margin: 0;
            size: A4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Calibri', 'Arial', sans-serif;
        }

        body {
            background-color: #ffffff;
            padding: 0;
            margin: 0;
        }

        .letter-container {
            width: 1000px;
            max-width: 1000px;
            background: white;
            margin: 0 auto;
            padding: 60px 80px;
        }

        /* Header - Enkel och ren */
        .letter-header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .name-section h1 {
            font-size: 24pt;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }

        .name-section h2 {
            font-size: 11pt;
            font-weight: normal;
            color: #7f8c8d;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }

        /* Kontaktinformation - clean och strukturerad */
        .contact-info {
            font-size: 9pt;
            color: #555;
            line-height: 1.6;
        }

        .contact-info div {
            display: inline-block;
            margin-right: 20px;
        }

        /* Datum - diskret */
        .date {
            text-align: right;
            font-size: 9pt;
            color: #777;
            margin-bottom: 30px;
        }

        /* Hälsning - tydlig och professionell */
        .salutation {
            font-size: 10pt;
            color: #333;
            margin-bottom: 20px;
        }

        /* Innehåll - clean och läsbar */
        .content-section {
            margin-bottom: 0;
            font-size: 10.5pt;
            color: #333;
            line-height: 1.65;
            text-align: justify;
        }

        .content-section p {
            margin-bottom: 14px;
            text-indent: 0;
        }

        /* Avslutning - enkel och professionell */
        .closing {
            margin-top: 30px;
        }

        .closing .sincerely {
            font-size: 10pt;
            color: #333;
            margin-bottom: 40px;
        }

        .closing .signature {
            font-size: 12pt;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .closing .attachment {
            font-size: 8pt;
            font-style: italic;
            color: #888;
            margin-top: 10px;
        }

        /* Print-optimering */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .letter-container {
                width: 100%;
                max-width: 100%;
                padding: 40px 60px;
            }
        }

        /* Förhindra sidbrytningar */
        .content-section {
            page-break-inside: avoid;
        }
    </style>
</head>
<body>
    <div class="letter-container">
        <!-- Header - Clean och professionell -->
        <div class="letter-header">
            <div class="name-section">
                <h1>$full_name</h1>
                <h2>$job_title</h2>
                <div class="contact-info">
                    $contact_info
                </div>
            </div>
        </div>

        <!-- Datum -->
        <div class="date">
            $date
        </div>

        <!-- Hälsning - direkt och rent -->
        <div class="salutation">$salutation</div>

        <!-- Innehåll - RENT och fokuserat på texten -->
        <div class="content-section">
            $section1_content
        </div>

        <!-- Avslutning - Enkel och professionell -->
        <div class="closing">
            <div class="sincerely">$closing_text</div>
            <div class="signature">$full_name</div>
            <div class="attachment">$attachment_text</div>
        </div>
    </div>
</body>
</html>
